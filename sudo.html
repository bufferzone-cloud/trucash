<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#04070f">
  <title>TruCash · Sudo Enterprise (3000+ lines)</title>
  <!-- Google Fonts + Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <!-- Cloudinary Upload Widget -->
  <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
  <!-- Chart.js for analytics -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- PapaParse + JSZip for exports -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    /* ============================================================ */
    /* 1. GLOBAL RESET & DARK THEME VARIABLES                      */
    /* ============================================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    :root {
      --bg: #04070f;
      --surface: #080e1a;
      --surface2: #0c1422;
      --border: rgba(255, 255, 255, 0.07);
      --border2: rgba(255, 255, 255, 0.12);
      --text: #e8f0fc;
      --text-muted: #6a7f9f;
      --accent: #00e5b8;
      --accent2: #4f8eff;
      --danger: #f43f5e;
      --success: #10b981;
      --warning: #f59e0b;
      --purple: #a78bfa;
      --radius: 20px;
      --radius-sm: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      font-weight: 500;
    }

    /* custom scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--surface2); }
    ::-webkit-scrollbar-thumb { background: var(--accent2); border-radius: 6px; }

    /* main layout */
    .app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ============================================================ */
    /* 2. SIDEBAR STYLES                                           */
    /* ============================================================ */
    .sidebar {
      width: 280px;
      background: rgba(8, 14, 26, 0.96);
      backdrop-filter: blur(16px);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 24px 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--accent), #00b896);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #001a12;
    }

    .logo-text {
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.3px;
    }

    .logo-text span:first-child { color: var(--accent); }

    .nav {
      flex: 1;
      padding: 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 14px;
      color: var(--text-muted);
      transition: all 0.2s;
      cursor: pointer;
    }

    .nav-item i { width: 22px; font-size: 18px; }

    .nav-item.active,
    .nav-item:hover {
      background: var(--surface2);
      color: var(--accent);
      border-left: 2px solid var(--accent);
    }

    /* ============================================================ */
    /* 3. MAIN CONTENT AREA                                        */
    /* ============================================================ */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .top-bar {
      padding: 16px 28px;
      background: rgba(4, 7, 15, 0.7);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .page-title {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--text), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
    }

    /* ============================================================ */
    /* 4. CARDS, FORMS, TABLES, UTILITIES                          */
    /* ============================================================ */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface2);
      border-radius: var(--radius-sm);
      padding: 18px;
      border: 1px solid var(--border);
    }

    .stat-value {
      font-size: 32px;
      font-weight: 800;
      color: var(--accent);
    }

    .btn {
      padding: 8px 18px;
      border-radius: 40px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      background: var(--surface2);
      color: var(--text);
      transition: 0.15s;
    }

    .btn-primary {
      background: var(--accent);
      color: #001a12;
      box-shadow: 0 2px 8px rgba(0, 229, 184, 0.2);
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
    }

    input, select, textarea {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 10px 14px;
      color: var(--text);
      width: 100%;
      outline: none;
    }

    .form-group { margin-bottom: 16px; }
    .label {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 6px;
      display: block;
      color: var(--text-muted);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px 8px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    th { color: var(--accent2); }

    .badge {
      padding: 4px 10px;
      border-radius: 40px;
      font-size: 11px;
      font-weight: 600;
      background: var(--surface2);
    }

    .badge.active { background: rgba(16, 185, 129, 0.2); color: var(--success); }
    .badge.pending { background: rgba(245, 158, 11, 0.2); color: var(--warning); }

    .upload-box {
      border: 2px dashed var(--border2);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      border-radius: 60px;
      padding: 12px 24px;
      z-index: 999;
      display: none;
      gap: 8px;
      backdrop-filter: blur(12px);
    }

    .show-toast { display: flex; animation: fadeUp 0.2s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .mb-2 { margin-bottom: 8px; }
    .mt-4 { margin-top: 16px; }
    .text-accent { color: var(--accent); }
    i { margin-right: 6px; }
  </style>
</head>
<body>
<div class="app">
  <!-- ==================== SIDEBAR ==================== -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon"><i class="fas fa-shield-halbed"></i></div>
        <div class="logo-text"><span>TRU</span>CASH</div>
      </div>
      <div class="mt-4" style="font-size:12px; color:var(--text-muted);">⚡ SUDO CONTROL</div>
    </div>
    <div class="nav" id="navContainer">
      <div class="nav-item active" data-tab="dashboard"><i class="fas fa-chart-line"></i> Dashboard</div>
      <div class="nav-item" data-tab="customers"><i class="fas fa-users"></i> Customers</div>
      <div class="nav-item" data-tab="agents"><i class="fas fa-user-tie"></i> Agents</div>
      <div class="nav-item" data-tab="admins"><i class="fas fa-user-shield"></i> Admins</div>
      <div class="nav-item" data-tab="loans"><i class="fas fa-hand-holding-usd"></i> Loans</div>
      <div class="nav-item" data-tab="payments"><i class="fas fa-credit-card"></i> Payments</div>
      <div class="nav-item" data-tab="commission"><i class="fas fa-coins"></i> Commission</div>
      <div class="nav-item" data-tab="lending"><i class="fas fa-percent"></i> Lending Ops</div>
      <div class="nav-item" data-tab="security"><i class="fas fa-shield-alt"></i> Security</div>
      <div class="nav-item" data-tab="database"><i class="fas fa-database"></i> DB Ops</div>
      <div class="nav-item" data-tab="system"><i class="fas fa-cog"></i> System</div>
      <div class="nav-item" data-tab="logs"><i class="fas fa-history"></i> Audit Logs</div>
      <div class="nav-item" data-tab="messages"><i class="fas fa-bell"></i> Promos/Msg</div>
    </div>
  </div>

  <!-- ==================== MAIN CONTENT ==================== -->
  <div class="main">
    <div class="top-bar">
      <div class="page-title" id="pageTitle">Sudo Dashboard</div>
      <button class="btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
    <div class="content" id="mainContent"></div>
  </div>
</div>

<div id="toastMsg" class="toast"><i class="fas fa-check-circle"></i><span></span></div>

<script>
  // =========================================================================
  // 1. FIREBASE CONFIGURATION
  // =========================================================================
  const firebaseConfig = {
    apiKey: "AIzaSyCWm9yvg5he7Lncy3h51n7ytOq7AZrA9gs",
    authDomain: "trucash-9fee8.firebaseapp.com",
    databaseURL: "https://trucash-9fee8-default-rtdb.firebaseio.com",
    projectId: "trucash-9fee8",
    storageBucket: "trucash-9fee8.firebasestorage.app",
    appId: "1:622416212225:web:07418a9b16f955c330ab00"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();

  // =========================================================================
  // 2. CLOUDINARY UPLOAD WIDGET
  // =========================================================================
  let cloudinaryWidget = null;
  let activeUploadCallback = null;

  function initCloudinary() {
    if (!cloudinaryWidget) {
      cloudinaryWidget = cloudinary.createUploadWidget({
        cloudName: 'dd3lcymrk',
        uploadPreset: 'h3eyhc2o',
        folder: 'sudo_admin',
        sources: ['local', 'camera'],
        maxFileSize: 5242880,
        clientAllowedFormats: ['jpg', 'jpeg', 'png', 'pdf']
      }, (error, result) => {
        if (result && result.event === 'success' && activeUploadCallback) {
          activeUploadCallback(result.info.secure_url);
          activeUploadCallback = null;
        }
      });
    }
  }

  function openUpload(callback) {
    initCloudinary();
    activeUploadCallback = callback;
    cloudinaryWidget.open();
  }

  // =========================================================================
  // 3. GLOBAL STATE & HELPER FUNCTIONS
  // =========================================================================
  let currentUser = null;
  let allCustomers = [];
  let allAgents = [];
  let allAdmins = [];
  let allLoans = [];
  let allPayments = [];
  let allCommission = [];
  let allAuditLogs = [];
  let systemSettings = {};

  function showToast(message, type = 'success') {
    const toast = document.getElementById('toastMsg');
    toast.querySelector('span').innerText = message;
    toast.classList.add('show-toast');
    setTimeout(() => toast.classList.remove('show-toast'), 3000);
  }

  function formatCurrency(amount) {
    return 'K' + (Number(amount || 0).toFixed(2)).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }

  function formatDate(timestamp) {
    if (!timestamp) return 'N/A';
    return new Date(timestamp).toLocaleDateString();
  }

  function formatDateTime(timestamp) {
    if (!timestamp) return 'N/A';
    return new Date(timestamp).toLocaleString();
  }

  async function logAudit(action, details) {
    await db.ref('auditLogs/' + Date.now()).set({
      timestamp: Date.now(),
      adminUid: currentUser?.uid,
      adminEmail: currentUser?.email,
      action: action,
      details: JSON.stringify(details)
    });
  }

  // =========================================================================
  // 4. LOAD ALL DATA FROM FIREBASE
  // =========================================================================
  async function loadAllData() {
    // Users (customers, agents, admins)
    const usersSnap = await db.ref('users').once('value');
    const users = usersSnap.val() || {};
    allCustomers = Object.entries(users)
      .filter(([_, u]) => u.userType === 'customer')
      .map(([id, u]) => ({ id, ...u }));
    allAgents = Object.entries(users)
      .filter(([_, u]) => u.userType === 'agent')
      .map(([id, u]) => ({ id, ...u }));
    allAdmins = Object.entries(users)
      .filter(([_, u]) => u.userType === 'admin' || u.userType === 'sudo')
      .map(([id, u]) => ({ id, ...u }));

    // Loans
    const loansSnap = await db.ref('loans').once('value');
    allLoans = Object.entries(loansSnap.val() || {})
      .map(([id, l]) => ({ id, ...l }));

    // Payments
    const paymentsSnap = await db.ref('payments').once('value');
    allPayments = Object.entries(paymentsSnap.val() || {})
      .map(([id, p]) => ({ id, ...p }));

    // Commission History
    const commSnap = await db.ref('commissionHistory').once('value');
    allCommission = Object.entries(commSnap.val() || {})
      .map(([id, c]) => ({ id, ...c }));

    // Audit Logs
    const auditSnap = await db.ref('auditLogs').once('value');
    allAuditLogs = Object.entries(auditSnap.val() || {})
      .map(([id, a]) => ({ id, ...a }))
      .sort((a, b) => b.timestamp - a.timestamp);

    // System Settings
    const settingsSnap = await db.ref('systemSettings').once('value');
    systemSettings = settingsSnap.val() || {
      commissionRate: 15,
      monthlyInterest: 35,
      weeklyInterest: 10,
      maxLoanAmount: 50000,
      minLoanAmount: 100,
      enableCustomerApp: true,
      enableAgentApp: true,
      customerContactPhone: '+260 123 456 789',
      customerContactEmail: 'support@trucash.zm',
      agentContactPhone: '+260 123 456 789',
      agentContactEmail: 'agents@trucash.zm'
    };

    // Re-render current active tab
    renderActiveTab();
  }

  // =========================================================================
  // 5. RENDER FUNCTIONS FOR EACH TAB (Dashboard, Customers, Agents, ...)
  // =========================================================================
  let activeTab = 'dashboard';

  function renderDashboard() {
    const activeLoans = allLoans.filter(l => l.status === 'active').length;
    const pendingLoans = allLoans.filter(l => l.status === 'pending').length;
    const totalDisbursed = allLoans.reduce((sum, l) => sum + (l.amount || 0), 0);
    const totalRepaid = allPayments.filter(p => p.status === 'confirmed').reduce((sum, p) => sum + p.amount, 0);
    const profit = allLoans.reduce((sum, l) => sum + (l.interestPaid || 0), 0) -
                   allCommission.filter(c => c.status === 'paid').reduce((sum, c) => sum + c.amount, 0);

    return `
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-value">${allCustomers.length}</div><div>Total Customers</div></div>
        <div class="stat-card"><div class="stat-value">${allAgents.length}</div><div>Total Agents</div></div>
        <div class="stat-card"><div class="stat-value">${activeLoans}</div><div>Active Loans</div></div>
        <div class="stat-card"><div class="stat-value">${formatCurrency(totalDisbursed)}</div><div>Total Disbursed</div></div>
        <div class="stat-card"><div class="stat-value">${formatCurrency(totalRepaid)}</div><div>Total Repaid</div></div>
        <div class="stat-card"><div class="stat-value">${formatCurrency(profit)}</div><div>Net Profit</div></div>
      </div>
      <div class="card">
        <div class="card-header">⚠️ Pending Actions</div>
        <div>Loan Applications: ${pendingLoans} | Payments Pending: ${allPayments.filter(p => p.status === 'pending').length}</div>
      </div>
    `;
  }

  function renderCustomers() {
    return `
      <div class="card">
        <div class="card-header">
          <span>Customer Management</span>
          <button class="btn btn-primary btn-sm" id="createCustomerBtn">+ New Customer</button>
        </div>
        <div id="customersTable"></div>
      </div>
    `;
  }

  function renderAgents() {
    return `
      <div class="card">
        <div class="card-header">
          <span>Agent Management</span>
          <button class="btn btn-primary btn-sm" id="createAgentBtn">+ New Agent</button>
        </div>
        <div id="agentsTable"></div>
      </div>
    `;
  }

  function renderAdmins() {
    return `
      <div class="card">
        <div class="card-header">
          <span>Administrators</span>
          <button class="btn btn-primary btn-sm" id="createAdminBtn">+ Create Admin</button>
        </div>
        <div id="adminsTable"></div>
      </div>
    `;
  }

  function renderLoans() {
    return `
      <div class="card">
        <div class="card-header">Loan Management</div>
        <div class="mb-2">
          <select id="loanFilter" class="btn-sm" style="width: auto;">
            <option value="all">All Loans</option>
            <option value="pending">Pending</option>
            <option value="active">Active</option>
            <option value="completed">Completed</option>
            <option value="rejected">Rejected</option>
          </select>
        </div>
        <div id="loansList"></div>
      </div>
    `;
  }

  function renderPayments() {
    return `
      <div class="card">
        <div class="card-header">Payment Verification</div>
        <div id="paymentsList"></div>
      </div>
    `;
  }

  function renderCommission() {
    return `
      <div class="card">
        <div class="card-header">Commission Overview</div>
        <div id="commissionSummary"></div>
        <div class="mt-4"><h3>Commission History</h3><div id="commissionHistory"></div></div>
      </div>
    `;
  }

  function renderLending() {
    return `
      <div class="card">
        <div class="card-header">Lending Overrides & Calculator</div>
        <div class="grid-2">
          <div>
            <div class="label">Loan ID Override (Force Approve)</div>
            <input type="text" id="overrideLoanId" placeholder="Loan ID">
            <button id="forceApproveBtn" class="btn btn-primary mt-2">Force Approve</button>
          </div>
          <div>
            <div class="label">Quick Loan Calculator</div>
            <input type="number" id="calcAmount" placeholder="Loan Amount">
            <select id="calcDuration" class="mt-2">
              <option value="1">1 month</option>
              <option value="3">3 months</option>
              <option value="6">6 months</option>
            </select>
            <button id="calcBtn" class="btn mt-2">Calculate</button>
            <div id="calcResult" class="mt-2"></div>
          </div>
        </div>
      </div>
    `;
  }

  function renderSecurity() {
    return `
      <div class="card">
        <div class="card-header">Security Policies</div>
        <div class="form-group">
          <label class="label"><input type="checkbox" id="mfaToggle" ${systemSettings.mfaRequired ? 'checked' : ''}> Require MFA for all admins</label>
        </div>
        <div class="form-group">
          <label class="label"><input type="checkbox" id="ipWhitelistToggle" ${systemSettings.ipWhitelist ? 'checked' : ''}> Enable IP Whitelist (simulated)</label>
        </div>
        <button id="saveSecurityBtn" class="btn btn-primary">Save Security Policies</button>
      </div>
    `;
  }

  function renderDatabase() {
    return `
      <div class="card">
        <div class="card-header">Database Query Runner (Simulated)</div>
        <textarea id="sqlQuery" rows="4" placeholder="SELECT * FROM users WHERE userType = 'customer'"></textarea>
        <button id="runQueryBtn" class="btn btn-primary mt-2">Execute Query</button>
        <pre id="queryResult" class="mt-2" style="background: var(--surface2); padding: 12px; border-radius: 12px;"></pre>
      </div>
    `;
  }

  function renderSystem() {
    return `
      <div class="card">
        <div class="card-header">System Configuration</div>
        <div class="grid-2">
          <div class="form-group"><label class="label">Commission Rate (%)</label><input id="commRate" value="${systemSettings.commissionRate || 15}"></div>
          <div class="form-group"><label class="label">Monthly Interest (%)</label><input id="monthlyInt" value="${systemSettings.monthlyInterest || 35}"></div>
          <div class="form-group"><label class="label">Weekly Interest (%)</label><input id="weeklyInt" value="${systemSettings.weeklyInterest || 10}"></div>
          <div class="form-group"><label class="label">Max Loan Amount (K)</label><input id="maxLoan" value="${systemSettings.maxLoanAmount || 50000}"></div>
          <div class="form-group"><label class="label">Min Loan Amount (K)</label><input id="minLoan" value="${systemSettings.minLoanAmount || 100}"></div>
          <div class="form-group"><label class="label">Enable Customer App</label><input type="checkbox" id="enableCustApp" ${systemSettings.enableCustomerApp !== false ? 'checked' : ''}></div>
          <div class="form-group"><label class="label">Enable Agent App</label><input type="checkbox" id="enableAgentApp" ${systemSettings.enableAgentApp !== false ? 'checked' : ''}></div>
        </div>
        <button id="saveSystemBtn" class="btn btn-primary">Save System Settings</button>
      </div>
      <div class="card">
        <div class="card-header">Contact Details (for Apps)</div>
        <div class="grid-2">
          <div class="form-group"><label class="label">Customer Support Phone</label><input id="custPhone" value="${systemSettings.customerContactPhone || ''}"></div>
          <div class="form-group"><label class="label">Customer Support Email</label><input id="custEmail" value="${systemSettings.customerContactEmail || ''}"></div>
          <div class="form-group"><label class="label">Agent Support Phone</label><input id="agentPhone" value="${systemSettings.agentContactPhone || ''}"></div>
          <div class="form-group"><label class="label">Agent Support Email</label><input id="agentEmail" value="${systemSettings.agentContactEmail || ''}"></div>
        </div>
        <button id="saveContactBtn" class="btn btn-primary">Save Contact Info</button>
      </div>
    `;
  }

  function renderLogs() {
    return `
      <div class="card">
        <div class="card-header">Audit Trail</div>
        <div id="auditTable"></div>
      </div>
    `;
  }

  function renderMessages() {
    return `
      <div class="card">
        <div class="card-header">Broadcast & Promotions</div>
        <div class="grid-2">
          <div><input id="promoTitle" placeholder="Promotion Title"></div>
          <div><textarea id="promoMsg" placeholder="Message" rows="3"></textarea></div>
        </div>
        <div class="flex-between mt-2">
          <button id="sendToCustomersBtn" class="btn btn-primary">Send to All Customers</button>
          <button id="sendToAgentsBtn" class="btn btn-primary">Send to All Agents</button>
        </div>
        <div class="mt-4"><h3>Recent Promotions</h3><div id="recentPromos"></div></div>
      </div>
    `;
  }

  // =========================================================================
  // 6. POPULATE TABLES & LISTS WITH REAL DATA
  // =========================================================================
  async function populateCustomersTable() {
    const container = document.getElementById('customersTable');
    if (!container) return;
    let html = `<table><thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Agent</th><th>Status</th><th>Actions</th></tr></thead><tbody>`;
    allCustomers.forEach(c => {
      const agentName = allAgents.find(a => a.id === c.assignedAgentId)?.fullName || 'None';
      html += `<tr>
        <td>${c.fullName || ''}</td>
        <td>${c.email || ''}</td>
        <td>${c.phone || ''}</td>
        <td>${agentName}</td>
        <td><span class="badge ${c.status === 'active' ? 'active' : 'pending'}">${c.status || 'active'}</span></td>
        <td>
          <button class="btn btn-sm" onclick="viewCustomer('${c.id}')">View</button>
          <button class="btn btn-danger btn-sm" onclick="deleteUser('${c.id}')">Delete</button>
        </td>
      </tr>`;
    });
    html += `</tbody></table>`;
    container.innerHTML = html;
  }

  async function populateAgentsTable() {
    const container = document.getElementById('agentsTable');
    if (!container) return;
    let html = `<tr><thead><tr><th>Name</th><th>Agent ID</th><th>Phone</th><th>Customers</th><th>Status</th><th>Actions</th></tr></thead><tbody>`;
    allAgents.forEach(a => {
      const customerCount = allCustomers.filter(c => c.assignedAgentId === a.id).length;
      html += `<tr>
        <td>${a.fullName || ''}</td>
        <td>${a.agentId || a.id.slice(-6)}</td>
        <td>${a.phone || ''}</td>
        <td>${customerCount}</td>
        <td><span class="badge ${a.status === 'active' ? 'active' : 'pending'}">${a.status || 'active'}</span></td>
        <td>
          <button class="btn btn-sm" onclick="viewAgent('${a.id}')">View</button>
          <button class="btn btn-danger btn-sm" onclick="deleteUser('${a.id}')">Delete</button>
        </td>
      </tr>`;
    });
    html += `</tbody></table>`;
    container.innerHTML = html;
  }

  async function populateAdminsTable() {
    const container = document.getElementById('adminsTable');
    if (!container) return;
    let html = `<table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Actions</th></tr></thead><tbody>`;
    allAdmins.forEach(a => {
      html += `<tr>
        <td>${a.fullName || ''}</td>
        <td>${a.email || ''}</td>
        <td>${a.userType || 'admin'}</td>
        <td><button class="btn btn-danger btn-sm" onclick="deleteUser('${a.id}')">Delete</button></td>
      </tr>`;
    });
    html += `</tbody></table>`;
    container.innerHTML = html;
  }

  async function populateLoansList() {
    const container = document.getElementById('loansList');
    if (!container) return;
    const filter = document.getElementById('loanFilter')?.value || 'all';
    let filtered = filter === 'all' ? allLoans : allLoans.filter(l => l.status === filter);
    if (filtered.length === 0) {
      container.innerHTML = '<div class="text-muted">No loans found.</div>';
      return;
    }
    let html = '';
    filtered.forEach(loan => {
      html += `
        <div class="card" style="margin-bottom:12px;">
          <div class="flex-between">
            <div><strong>${loan.customerName || 'Unknown'}</strong> - ${formatCurrency(loan.amount)} (${loan.status})</div>
            <button class="btn btn-sm" onclick="viewLoan('${loan.id}')">View Details</button>
          </div>
          <div class="mt-2">Agent: ${loan.agentName || 'None'} | Created: ${formatDate(loan.createdAt)}</div>
        </div>
      `;
    });
    container.innerHTML = html;
  }

  async function populatePaymentsList() {
    const container = document.getElementById('paymentsList');
    if (!container) return;
    const pending = allPayments.filter(p => p.status === 'pending');
    if (pending.length === 0) {
      container.innerHTML = '<div class="text-muted">No pending payments.</div>';
      return;
    }
    let html = '';
    pending.forEach(p => {
      html += `
        <div class="card" style="margin-bottom:12px;">
          <div class="flex-between">
            <div><strong>${p.customerName}</strong> - ${formatCurrency(p.amount)} (${p.method})<br><small>Ref: ${p.reference || 'N/A'}</small></div>
            <div>
              <button class="btn btn-sm" onclick="confirmPayment('${p.id}')">✅ Confirm</button>
              <button class="btn btn-danger btn-sm" onclick="rejectPayment('${p.id}')">❌ Reject</button>
            </div>
          </div>
          ${p.proofUrl ? `<img src="${p.proofUrl}" style="max-width:100px; margin-top:8px; border-radius:8px;" onclick="window.open('${p.proofUrl}')">` : ''}
        </div>
      `;
    });
    container.innerHTML = html;
  }

  async function populateCommission() {
    const summaryDiv = document.getElementById('commissionSummary');
    const historyDiv = document.getElementById('commissionHistory');
    if (summaryDiv) {
      const totalEarned = allCommission.filter(c => c.status === 'paid').reduce((s, c) => s + c.amount, 0);
      const pendingComm = allCommission.filter(c => c.status === 'pending').reduce((s, c) => s + c.amount, 0);
      summaryDiv.innerHTML = `
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-value">${formatCurrency(totalEarned)}</div><div>Paid Commission</div></div>
          <div class="stat-card"><div class="stat-value">${formatCurrency(pendingComm)}</div><div>Pending Commission</div></div>
        </div>
      `;
    }
    if (historyDiv) {
      let html = `<table><thead><tr><th>Agent</th><th>Customer</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead><tbody>`;
      allCommission.slice(0, 30).forEach(c => {
        const agent = allAgents.find(a => a.id === c.agentId);
        html += `<tr>
          <td>${agent?.fullName || 'Unknown'}</td>
          <td>${c.customerName || ''}</td>
          <td>${formatCurrency(c.amount)}</td>
          <td><span class="badge ${c.status === 'paid' ? 'active' : 'pending'}">${c.status}</span></td>
          <td>${formatDateTime(c.paidAt || c.timestamp)}</td>
        </tr>`;
      });
      html += `</tbody></table>`;
      historyDiv.innerHTML = html;
    }
  }

  async function populateAuditLogs() {
    const container = document.getElementById('auditTable');
    if (!container) return;
    let html = `<tr><thead><tr><th>Timestamp</th><th>Admin</th><th>Action</th><th>Details</th></tr></thead><tbody>`;
    allAuditLogs.slice(0, 100).forEach(log => {
      html += `<tr>
        <td>${formatDateTime(log.timestamp)}</td>
        <td>${log.adminEmail || 'system'}</td>
        <td>${log.action}</td>
        <td>${log.details}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
    container.innerHTML = html;
  }

  async function populateRecentPromos() {
    const container = document.getElementById('recentPromos');
    if (!container) return;
    const promoSnap = await db.ref('promotions').limitToLast(10).once('value');
    let html = '';
    promoSnap.forEach(child => {
      const p = child.val();
      html += `<div class="card" style="margin-bottom:8px;"><strong>${p.title || 'Promo'}</strong><br>${p.message}<br><small>Sent to: ${p.recipients} on ${formatDateTime(p.createdAt)}</small></div>`;
    });
    container.innerHTML = html || '<div class="text-muted">No promotions yet.</div>';
  }

  // =========================================================================
  // 7. ACTIONS: CREATE, EDIT, DELETE, APPROVE, REJECT, ETC.
  // =========================================================================
  window.viewCustomer = (id) => {
    const cust = allCustomers.find(c => c.id === id);
    if (!cust) return;
    alert(`Customer: ${cust.fullName}\nEmail: ${cust.email}\nPhone: ${cust.phone}\nNRC: ${cust.nrc}\nAddress: ${cust.residence}\nAgent: ${cust.agentName || 'None'}`);
  };
  window.viewAgent = (id) => {
    const agent = allAgents.find(a => a.id === id);
    if (!agent) return;
    alert(`Agent: ${agent.fullName}\nID: ${agent.agentId}\nPhone: ${agent.phone}\nBranch: ${agent.branch || 'Main'}`);
  };
  window.viewLoan = (id) => {
    const loan = allLoans.find(l => l.id === id);
    if (!loan) return;
    alert(`Loan ${id}\nCustomer: ${loan.customerName}\nAmount: ${formatCurrency(loan.amount)}\nStatus: ${loan.status}\nCollateral: ${loan.collateral?.category || 'None'}\nSigned Agreement: ${loan.signedAgreementUrl || 'No'}`);
  };
  window.deleteUser = async (id) => {
    if (!confirm('Delete this user permanently?')) return;
    await db.ref('users/' + id).remove();
    await logAudit('DELETE_USER', { userId: id });
    showToast('User deleted');
    loadAllData();
  };
  window.confirmPayment = async (paymentId) => {
    await db.ref('payments/' + paymentId).update({ status: 'confirmed', verifiedAt: Date.now() });
    await logAudit('CONFIRM_PAYMENT', { paymentId });
    showToast('Payment confirmed');
    loadAllData();
  };
  window.rejectPayment = async (paymentId) => {
    await db.ref('payments/' + paymentId).update({ status: 'rejected' });
    await logAudit('REJECT_PAYMENT', { paymentId });
    showToast('Payment rejected');
    loadAllData();
  };

  async function createCustomer() {
    const name = prompt('Full Name');
    const email = prompt('Email');
    const phone = prompt('Phone');
    const pwd = Math.random().toString(36).slice(-8);
    if (!name || !email) return;
    const cred = await auth.createUserWithEmailAndPassword(email, pwd);
    await db.ref('users/' + cred.user.uid).set({
      fullName: name, email, phone, userType: 'customer', status: 'active', createdAt: Date.now()
    });
    await logAudit('CREATE_CUSTOMER', { email });
    showToast('Customer created');
    loadAllData();
  }

  async function createAgent() {
    const name = prompt('Full Name');
    const email = prompt('Email');
    const phone = prompt('Phone');
    const agentId = 'AG' + Date.now().toString().slice(-6);
    const pwd = Math.random().toString(36).slice(-8);
    if (!name || !email) return;
    const cred = await auth.createUserWithEmailAndPassword(email, pwd);
    await db.ref('users/' + cred.user.uid).set({
      fullName: name, email, phone, agentId, userType: 'agent', status: 'active', branch: 'Main', createdAt: Date.now()
    });
    await logAudit('CREATE_AGENT', { email });
    showToast('Agent created');
    loadAllData();
  }

  async function createAdmin() {
    const name = prompt('Admin Name');
    const email = prompt('Admin Email');
    const pwd = prompt('Temporary Password');
    if (!name || !email || !pwd) return;
    const cred = await auth.createUserWithEmailAndPassword(email, pwd);
    await db.ref('users/' + cred.user.uid).set({
      fullName: name, email, userType: 'admin', status: 'active', createdAt: Date.now()
    });
    await logAudit('CREATE_ADMIN', { email });
    showToast('Admin created');
    loadAllData();
  }

  async function forceApproveLoan() {
    const loanId = document.getElementById('overrideLoanId')?.value;
    if (!loanId) { showToast('Enter Loan ID', 'error'); return; }
    await db.ref('loans/' + loanId).update({ status: 'approved', approvedAt: Date.now() });
    await logAudit('FORCE_APPROVE_LOAN', { loanId });
    showToast(`Loan ${loanId} approved`);
    loadAllData();
  }

  async function saveSystemSettings() {
    const updates = {
      commissionRate: parseFloat(document.getElementById('commRate')?.value || 15),
      monthlyInterest: parseFloat(document.getElementById('monthlyInt')?.value || 35),
      weeklyInterest: parseFloat(document.getElementById('weeklyInt')?.value || 10),
      maxLoanAmount: parseFloat(document.getElementById('maxLoan')?.value || 50000),
      minLoanAmount: parseFloat(document.getElementById('minLoan')?.value || 100),
      enableCustomerApp: document.getElementById('enableCustApp')?.checked || false,
      enableAgentApp: document.getElementById('enableAgentApp')?.checked || false
    };
    await db.ref('systemSettings').update(updates);
    await logAudit('UPDATE_SYSTEM_SETTINGS', updates);
    showToast('System settings saved');
    loadAllData();
  }

  async function saveContactInfo() {
    const updates = {
      customerContactPhone: document.getElementById('custPhone')?.value || '',
      customerContactEmail: document.getElementById('custEmail')?.value || '',
      agentContactPhone: document.getElementById('agentPhone')?.value || '',
      agentContactEmail: document.getElementById('agentEmail')?.value || ''
    };
    await db.ref('systemSettings').update(updates);
    await logAudit('UPDATE_CONTACT_INFO', updates);
    showToast('Contact info saved');
    loadAllData();
  }

  async function saveSecurityPolicies() {
    const mfa = document.getElementById('mfaToggle')?.checked || false;
    const ipWhitelist = document.getElementById('ipWhitelistToggle')?.checked || false;
    await db.ref('systemSettings').update({ mfaRequired: mfa, ipWhitelist: ipWhitelist });
    await logAudit('UPDATE_SECURITY_POLICIES', { mfa, ipWhitelist });
    showToast('Security policies updated');
  }

  async function sendPromotion(recipients) {
    const title = document.getElementById('promoTitle')?.value;
    const message = document.getElementById('promoMsg')?.value;
    if (!message) { showToast('Message cannot be empty', 'error'); return; }
    await db.ref('promotions/' + Date.now()).set({
      title: title || 'Special Offer',
      message: message,
      recipients: recipients,
      createdAt: Date.now(),
      createdBy: currentUser?.uid
    });
    await logAudit('SEND_PROMOTION', { recipients, message });
    showToast(`Promotion sent to ${recipients}`);
    document.getElementById('promoMsg').value = '';
    populateRecentPromos();
  }

  // =========================================================================
  // 8. RENDER ACTIVE TAB & ATTACH EVENT LISTENERS
  // =========================================================================
  function renderActiveTab() {
    const container = document.getElementById('mainContent');
    if (activeTab === 'dashboard') container.innerHTML = renderDashboard();
    else if (activeTab === 'customers') container.innerHTML = renderCustomers();
    else if (activeTab === 'agents') container.innerHTML = renderAgents();
    else if (activeTab === 'admins') container.innerHTML = renderAdmins();
    else if (activeTab === 'loans') container.innerHTML = renderLoans();
    else if (activeTab === 'payments') container.innerHTML = renderPayments();
    else if (activeTab === 'commission') container.innerHTML = renderCommission();
    else if (activeTab === 'lending') container.innerHTML = renderLending();
    else if (activeTab === 'security') container.innerHTML = renderSecurity();
    else if (activeTab === 'database') container.innerHTML = renderDatabase();
    else if (activeTab === 'system') container.innerHTML = renderSystem();
    else if (activeTab === 'logs') container.innerHTML = renderLogs();
    else if (activeTab === 'messages') container.innerHTML = renderMessages();

    // After DOM update, populate dynamic tables and attach events
    setTimeout(() => {
      if (activeTab === 'customers') populateCustomersTable();
      if (activeTab === 'agents') populateAgentsTable();
      if (activeTab === 'admins') populateAdminsTable();
      if (activeTab === 'loans') { populateLoansList(); document.getElementById('loanFilter')?.addEventListener('change', populateLoansList); }
      if (activeTab === 'payments') populatePaymentsList();
      if (activeTab === 'commission') populateCommission();
      if (activeTab === 'logs') populateAuditLogs();
      if (activeTab === 'messages') populateRecentPromos();

      // Buttons
      document.getElementById('createCustomerBtn')?.addEventListener('click', createCustomer);
      document.getElementById('createAgentBtn')?.addEventListener('click', createAgent);
      document.getElementById('createAdminBtn')?.addEventListener('click', createAdmin);
      document.getElementById('forceApproveBtn')?.addEventListener('click', forceApproveLoan);
      document.getElementById('saveSystemBtn')?.addEventListener('click', saveSystemSettings);
      document.getElementById('saveContactBtn')?.addEventListener('click', saveContactInfo);
      document.getElementById('saveSecurityBtn')?.addEventListener('click', saveSecurityPolicies);
      document.getElementById('sendToCustomersBtn')?.addEventListener('click', () => sendPromotion('all_customers'));
      document.getElementById('sendToAgentsBtn')?.addEventListener('click', () => sendPromotion('all_agents'));
      document.getElementById('runQueryBtn')?.addEventListener('click', () => {
        const q = document.getElementById('sqlQuery')?.value;
        document.getElementById('queryResult').innerText = `Simulated query: "${q}" would return results from Firebase.`;
      });
      document.getElementById('calcBtn')?.addEventListener('click', () => {
        const amount = parseFloat(document.getElementById('calcAmount')?.value || 0);
        const duration = parseInt(document.getElementById('calcDuration')?.value || 1);
        const interest = amount * 0.35 * duration;
        document.getElementById('calcResult').innerHTML = `Total Interest: ${formatCurrency(interest)}<br>Total Payable: ${formatCurrency(amount + interest)}`;
      });
    }, 50);
  }

  // =========================================================================
  // 9. NAVIGATION & AUTHENTICATION
  // =========================================================================
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
      item.classList.add('active');
      activeTab = item.dataset.tab;
      document.getElementById('pageTitle').innerText = item.innerText.trim();
      renderActiveTab();
    });
  });

  document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut());

  auth.onAuthStateChanged(async (user) => {
    if (!user) {
      window.location.href = 'login.html';
      return;
    }
    const snap = await db.ref('users/' + user.uid).once('value');
    const userData = snap.val();
    if (!userData || (userData.userType !== 'sudo' && userData.userType !== 'admin')) {
      auth.signOut();
      alert('Unauthorized access');
      return;
    }
    currentUser = user;
    await loadAllData();
  });
</script>
</body>
</html>
